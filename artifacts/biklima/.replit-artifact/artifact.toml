kind = "web"
previewPath = "/"
title = "بكلمة - البرنامج التحويلي"
version = "1.0.0"
id = "artifacts/biklima"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24589

[services.development]
run = "pnpm --filter @workspace/biklima run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biklima", "run", "build" ]
publicDir = "artifacts/biklima/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24589"
BASE_PATH = "/"
